name: Bump version

on:
  push:
    branches: [main]

# Skip if the commit was made by this workflow (prevents infinite loop)
jobs:
  bump:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MARKETPLACE_TOKEN }}

      - name: Determine bump type from commit message
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qiE '^breaking|^feat!|BREAKING CHANGE'; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$MSG" | grep -qiE '^feat'; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version in plugin.json
        id: version
        run: |
          FILE=".claude-plugin/plugin.json"
          CURRENT=$(python3 -c "import json; print(json.load(open('$FILE'))['version'])")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          python3 -c "
          import json
          with open('$FILE') as f: d = json.load(f)
          d['version'] = '$NEW'
          with open('$FILE', 'w') as f: json.dump(d, f, indent=2)
          "
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "Bumped: $CURRENT → $NEW (${{ steps.bump.outputs.type }})"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git commit -m "v${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push && git push --tags
